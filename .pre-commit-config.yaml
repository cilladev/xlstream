# Pre-commit configuration for xlstream.
#
# Setup once:
#   pip install pre-commit
#   pre-commit install --install-hooks
#   pre-commit install --hook-type commit-msg
#   pre-commit install --hook-type pre-push
#
# Run manually on all files:
#   pre-commit run --all-files
#   pre-commit run --all-files --hook-stage pre-push   # includes clippy
#
# See docs/standards/commits.md for the full contributor workflow.

default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_stages: [pre-commit]

repos:
  # -------- generic hygiene --------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: [--fix=lf]

  # -------- typos --------
  - repo: https://github.com/crate-ci/typos
    rev: v1.28.1
    hooks:
      - id: typos

  # -------- Rust: fast checks on commit --------
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace --all-targets --all-features
        language: system
        types: [rust]
        pass_filenames: false
        # Skip if no Rust crates exist yet (Phase 0 → Phase 1 transition).
        require_serial: true

  # -------- Rust: heavy checks on push --------
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
        require_serial: true

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace --all-features
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
        require_serial: true

      - id: cargo-doctest
        name: cargo test --doc
        entry: cargo test --workspace --doc
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
        require_serial: true

  # -------- Python (only for bindings/python/) --------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^bindings/python/
      - id: ruff-format
        files: ^bindings/python/

  # -------- commit message format --------
  - repo: local
    hooks:
      - id: commit-msg-format
        name: commit message format
        entry: scripts/check-commit-msg.sh
        language: script
        stages: [commit-msg]

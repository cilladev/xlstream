name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Per-PR performance gate — fails if micro-benchmarks regress >15%.
  # Skips comparison if no baseline exists yet (first run).
  bench-gate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run micro-benchmarks
        run: cargo bench --bench parse --bench arithmetic --bench lookup --bench string --bench math --bench conditional --bench info --bench date --bench financial -p xlstream-benchmarks -- --output-format bencher | tee output.txt
      - name: Check if baseline exists
        id: check-baseline
        run: |
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No gh-pages baseline yet — skipping comparison. Baseline created on first merge to main."
          fi
      - name: Compare against baseline
        if: steps.check-baseline.outputs.exists == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: output.txt
          alert-threshold: '115%'
          fail-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-on-alert: true

  # On merge to main — update benchmark baseline (creates gh-pages on first run).
  bench-update:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run micro-benchmarks
        run: cargo bench --bench parse --bench arithmetic --bench lookup --bench string --bench math --bench conditional --bench info --bench date --bench financial -p xlstream-benchmarks -- --output-format bencher | tee output.txt
      - name: Update baseline
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

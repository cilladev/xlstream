name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"   # 03:17 UTC daily
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace
      - name: Publish results to gh-pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "criterion"
          output-file-path: target/criterion
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
        continue-on-error: true  # remove once benchmarks crate exists (Phase 12)

  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_parser, fuzz_xlsx_reader, fuzz_classifier]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=600
        continue-on-error: true  # remove once fuzz targets exist

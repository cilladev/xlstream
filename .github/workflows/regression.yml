name: Regression

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Golden-file regression (117 surfaces vs Excel)
        run: cargo test -p xlstream-eval --test regression_base -- golden_file_regression --nocapture
      - name: Per-issue regression tests
        run: cargo test -p xlstream-eval --test regression_per_issue --nocapture

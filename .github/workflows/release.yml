name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  # On push to main, read version from Cargo.toml and create a tag if missing.
  # The new tag triggers this same workflow again via the tags: ["v*"] trigger,
  # which runs the build + publish jobs below.
  tag-release:
    name: Create Release Tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from Cargo.toml
        id: meta
        run: |
          version="$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          git fetch --tags --force
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

  # Build one wheel per (os, arch). abi3-py39 = Python 3.9-3.14+ covered.
  build-wheels:
    name: wheels (${{ matrix.os }}-${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: ./bindings/python
          args: --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: bindings/python/dist/*.whl

  # Source distribution (.tar.gz of Python source). Fallback for platforms
  # without a prebuilt wheel — pip downloads and compiles locally.
  sdist:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: ./bindings/python
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: bindings/python/dist/*.tar.gz

  # Publishes to PyPI via Trusted Publishing (OIDC). No API token needed.
  #
  # Setup on PyPI (one-time, before first release):
  #   1. Sign in to https://pypi.org/ and create the project `xlstream`,
  #      OR use the "pending publisher" flow to pre-authorise before the
  #      first version exists.
  #   2. Project → Manage → Publishing → Add a new trusted publisher:
  #        Owner:            cilladev
  #        Repository:       xlstream
  #        Workflow name:    release.yml
  #        Environment:      pypi
  #   3. Repo → Settings → Environments → create `pypi` with a required
  #      reviewer so publishes gate on manual approval.
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with: { name: sdist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1

  # Creates a GitHub Release with changelog-extracted notes and wheel artifacts.
  publish-github:
    name: Publish GitHub Release
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        run: |
          version="${{ steps.meta.outputs.version }}"
          python3 - "$version" <<'PY'
          import sys
          from pathlib import Path

          version = sys.argv[1]
          changelog = Path("CHANGELOG.md")
          if not changelog.exists():
              Path("release-notes.md").write_text("No changelog entry found.\n")
              sys.exit(0)

          in_section = False
          lines = []
          for line in changelog.read_text().splitlines():
              if line.startswith("## "):
                  if in_section:
                      break
                  if version in line:
                      in_section = True
                      continue
              elif in_section:
                  lines.append(line)

          body = "\n".join(lines).strip() or "No changelog entry found."
          Path("release-notes.md").write_text(body + "\n")
          PY

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8
        with: { name: sdist, path: dist }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: release-notes.md
          files: dist/*

  # crates.io publish, in dependency order. Gated on manual approval via
  # the `crates-io` environment. crates.io does NOT support OIDC trusted
  # publishing as of 2026, so this one still uses an API token.
  #
  # Setup (one-time):
  #   1. crates.io → Account Settings → API tokens → New token scoped to
  #      the xlstream-* crates.
  #   2. Repo → Settings → Environments → `crates-io` with required reviewer.
  #   3. Under that environment, add secret `CARGO_REGISTRY_TOKEN`.
  publish-crates:
    name: Publish to crates.io
    needs: [build-wheels]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p xlstream-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p xlstream-parse --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p xlstream-io --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p xlstream-eval --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

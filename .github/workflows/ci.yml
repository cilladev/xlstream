name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Unit tests + doctests across platforms.
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests
        run: cargo test --workspace --all-features --exclude xlstream-python
      - name: Doctests
        run: cargo test --workspace --doc --exclude xlstream-python

  # End-to-end integration tests (full pipeline per feature).
  end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: End-to-end integration tests
        run: cargo test -p xlstream-eval --test end_to_end -- --nocapture

  # Golden-file regression (all 117 surfaces vs Excel cached values).
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Golden-file regression
        run: cargo test -p xlstream-eval --test regression_base -- --nocapture

  # Python wheel + pytest across platforms.
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - id: guard
        name: Check for bindings/python
        shell: bash
        run: |
          if [ -f bindings/python/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::bindings/python/pyproject.toml not present — skipping"
          fi
      - if: steps.guard.outputs.present == 'true'
        uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - if: steps.guard.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.guard.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
      - if: steps.guard.outputs.present == 'true'
        name: Create virtualenv and install deps
        working-directory: bindings/python
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          pip install maturin pytest openpyxl
      - if: steps.guard.outputs.present == 'true'
        name: Build and install wheel
        working-directory: bindings/python
        shell: bash
        run: |
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          maturin develop --release
      - if: steps.guard.outputs.present == 'true'
        name: Run pytest
        working-directory: bindings/python
        shell: bash
        run: |
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          pytest -v

  # Security audit.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

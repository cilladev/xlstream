name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Platform matrix for the Rust test suite. Format + clippy + doctests run in
  # pre-commit.yml — this workflow's job is to catch OS-specific regressions.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --exclude xlstream-python
      - run: cargo test --workspace --doc --exclude xlstream-python

  # Platform matrix for the Python wheel + pytest. abi3-py39 means one Python
  # version in CI is enough; the wheel works on 3.9-3.14+.
  #
  # Gated on `bindings/python/pyproject.toml` existing. The binding lands in
  # Phase 11; until then every step after the guard is skipped and the job
  # reports success (a "green skip", not a red failure).
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - id: guard
        name: Check for bindings/python
        shell: bash
        run: |
          if [ -f bindings/python/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::bindings/python/pyproject.toml not present — skipping (lands in Phase 11)"
          fi
      - if: steps.guard.outputs.present == 'true'
        uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - if: steps.guard.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.guard.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
      - if: steps.guard.outputs.present == 'true'
        name: Create virtualenv and install deps
        working-directory: bindings/python
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          pip install maturin pytest openpyxl
      - if: steps.guard.outputs.present == 'true'
        name: Build and install wheel
        working-directory: bindings/python
        shell: bash
        run: |
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          maturin develop --release
      - if: steps.guard.outputs.present == 'true'
        name: Run pytest
        working-directory: bindings/python
        shell: bash
        run: |
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          pytest -v

  # Security audit on dependency tree. Uses taiki-e/install-action which
  # downloads a prebuilt cargo-audit binary from the cargo-audit release page
  # — no source compile, so our pinned rust-toolchain.toml doesn't
  # collide with newer cargo-audit MSRVs (cargo-audit 0.22+ needs rustc 1.85).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  # Golden-file + per-issue regression tests — accuracy gate.
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Golden-file regression (117 surfaces vs Excel)
        run: cargo test -p xlstream-eval --test regression_base -- golden_file_regression --nocapture
      - name: Per-issue regression tests
        run: cargo test -p xlstream-eval --test regression_per_issue --nocapture

  # Per-PR performance gate — fails if micro-benchmarks regress >15%.
  bench-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run micro-benchmarks
        run: cargo bench --bench parse --bench arithmetic --bench lookup -p xlstream-benchmarks -- --output-format bencher | tee output.txt
      - name: Compare against baseline
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: output.txt
          alert-threshold: '115%'
          fail-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-on-alert: true

  # On merge to main — update benchmark baseline.
  bench-update:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run micro-benchmarks
        run: cargo bench --bench parse --bench arithmetic --bench lookup -p xlstream-benchmarks -- --output-format bencher | tee output.txt
      - name: Update baseline
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

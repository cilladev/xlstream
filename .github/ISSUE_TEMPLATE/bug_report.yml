name: Bug Report
description: Report a bug in xlstream
labels: ["bug"]

body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details.
      value: |
        - xlstream version:
        - Host: Python / Rust CLI / both
        - OS:
        - Python version (if applicable):
        - Rust toolchain (if building from source):
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the issue.
      placeholder: |
        1. Create workbook with formula `=VLOOKUP(...)`
        2. Run `xlstream.evaluate("input.xlsx", "output.xlsx")`
        3. See error / wrong output
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead. Include error output, wrong cell values, or stack traces.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any extra context — formula text, workbook details, screenshots, links.
    validations:
      required: false

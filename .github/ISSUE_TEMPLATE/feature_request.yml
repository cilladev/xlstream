name: Feature Request
description: Suggest a new feature or function
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What formula or workflow is unsupported?
      placeholder: |
        I'm trying to use `=XLOOKUP(...)` with wildcard matching, but xlstream returns #N/A.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Include expected formula behavior and Excel comparison if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New function (e.g., XLOOKUP wildcard)
        - Performance
        - Python API
        - CLI
        - I/O (reading/writing xlsx)
        - Documentation
        - Other
    validations:
      required: true
